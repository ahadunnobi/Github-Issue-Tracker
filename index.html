<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- tailwind and daisy khalamoni -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen flex flex-col items-center justify-center p-4">
 
    <!-- login from -->
    <div id="login-container" class="w-full max-w-[340px] flex flex-col items-center">
        <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mb-6">
        <h1 class="text-2xl font-light mb-2 text-white">GitHub Issues Tracker</h1>
        <p class="text-sm text-[#8b949e] mb-6">Sign in to manage your issues</p>

        <div class="w-full bg-[#161b22] border border-[#30363d] rounded-md p-5 shadow-lg">
            <form id="login-form">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-normal mb-2 text-[#c9d1d9]">Username</label>
                    <input type="text" id="username" name="username"
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] outline-none transition-all"
                        required>
                        <label for="username" class="block text-sm font-normal mb-2 text-[#4A00FF]">Default: admin</label>
                </div>
                <div class="mb-5">
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-sm font-normal text-[#c9d1d9]">Password</label>
                    </div>
                    <input type="password" id="password" name="password"
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] outline-none transition-all"
                        required>
                         <label for="username" class="block text-sm font-normal mb-2 text-[#4A00FF]">Default: admin123</label>
                </div>
                <button type="submit"
                    class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-semibold py-1.5 rounded-md text-sm transition-colors border border-[rgba(240,246,252,0.1)] shadow-sm">
                    Sign in
                </button>
            </form>
        </div>

        <div class="mt-4 w-full border border-[#30363d] rounded-md p-4 bg-[#161b22] flex flex-col items-center">
            <p class="text-xs text-[#8b949e] mb-2 font-medium">DEMO CREDENTIALS</p>
            <div class="flex flex-col gap-1 text-xs">
                <p><span class="text-[#58a6ff]">Username:</span> admin</p>
                <p><span class="text-[#58a6ff]">Password:</span> admin123</p>
            </div>
        </div>
    </div>
    
</body>

</html>
