<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- tailwind and daisy khalamoni -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen flex flex-col items-center justify-center p-4">

    <!-- login from -->
    <div id="login-container" class="w-full max-w-[340px] flex flex-col items-center">
        <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mb-6">
        <h1 class="text-2xl font-light mb-2 text-white">GitHub Issues Tracker</h1>
        <p class="text-sm text-[#8b949e] mb-6">Sign in to manage your issues</p>

        <div class="w-full bg-[#161b22] border border-[#30363d] rounded-md p-5 shadow-lg">
            <form id="login-form">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-normal mb-2 text-[#c9d1d9]">Username</label>
                    <input type="text" id="username" name="username"
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] outline-none transition-all"
                        required>
                    <label for="username" class="block text-sm font-normal mb-2 text-[#4A00FF]">Default: admin</label>
                </div>
                <div class="mb-5">
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-sm font-normal text-[#c9d1d9]">Password</label>
                    </div>
                    <input type="password" id="password" name="password"
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] outline-none transition-all"
                        required>
                    <label for="username" class="block text-sm font-normal mb-2 text-[#4A00FF]">Default:
                        admin123</label>
                </div>
                <button type="submit"
                    class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-semibold py-1.5 rounded-md text-sm transition-colors border border-[rgba(240,246,252,0.1)] shadow-sm">
                    Sign in
                </button>
            </form>
        </div>

        <div class="mt-4 w-full border border-[#30363d] rounded-md p-4 bg-[#161b22] flex flex-col items-center">
            <p class="text-xs text-[#8b949e] mb-2 font-medium">DEMO CREDENTIALS</p>
            <div class="flex flex-col gap-1 text-xs">
                <p><span class="text-[#58a6ff]">Username:</span> admin</p>
                <p><span class="text-[#58a6ff]">Password:</span> admin123</p>
            </div>
        </div>
    </div>


    <div id="main-content" class="hidden w-full min-h-screen flex flex-col">
        <nav
            class="bg-[#161b22] border-b border-[#30363d] py-4 px-6 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-50 gap-4 sm:gap-0">
            <div class="flex items-center gap-3 self-start sm:self-auto">
                <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8">
                <span class="text-xl font-semibold text-white tracking-tight">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-2 max-w-none sm:max-w-md w-full ml-0 sm:ml-4">
                <div class="relative w-full">
                    <input type="text" id="search-input" placeholder="Search issues..."
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md py-1.5 pl-9 pr-10 text-sm focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] outline-none transition-all">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[#8b949e] text-xs"></i>
                    <button id="clear-search"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-[#8b949e] hover:text-white transition-colors hidden">
                        <i class="fa-solid fa-circle-xmark text-sm"></i>
                    </button>
                </div>
                <button id="search-btn"
                    class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] px-4 py-1.5 rounded-md text-sm font-medium transition-colors">
                    Search
                </button>
            </div>
        </nav>

        <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
            <div class="mb-8">
                <div class="flex flex-nowrap overflow-x-auto gap-2 mb-6 border-b border-[#30363d] pb-4 no-scrollbar">
                    <button data-tab="all"
                        class="tab-btn active px-4 py-2 rounded-md text-sm font-medium hover:bg-[#21262d] transition-colors relative flex items-center gap-2">
                        <i class="fa-solid fa-list-ul text-xs"></i>
                        All Issues
                        <span id="all-count"
                            class="tab-count bg-[#30363d] text-[#8b949e] px-1.5 py-0.5 rounded-full text-[10px]">0</span>
                    </button>
                    <button data-tab="open"
                        class="tab-btn px-4 py-2 rounded-md text-sm font-medium hover:bg-[#21262d] transition-colors relative flex items-center gap-2">
                        <i class="fa-solid fa-circle-dot text-xs text-[#3fb950]"></i>
                        Open
                        <span id="open-count"
                            class="tab-count bg-[#30363d] text-[#8b949e] px-1.5 py-0.5 rounded-full text-[10px]">0</span>
                    </button>
                    <button data-tab="closed"
                        class="tab-btn px-4 py-2 rounded-md text-sm font-medium hover:bg-[#21262d] transition-colors relative flex items-center gap-2">
                        <i class="fa-solid fa-circle-check text-xs text-[#a371f7]"></i>
                        Closed
                        <span id="closed-count"
                            class="tab-count bg-[#30363d] text-[#8b949e] px-1.5 py-0.5 rounded-full text-[10px]">0</span>
                    </button>
                </div>
            </div>

            <div id="issue-container"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-8 px-6">
                <!-- Issues will be dynamically rendered here -->
            </div>
        </main>
    </div>



    <!-- script -->

    <script src="./script.js"> </script>
</body>

</html>
